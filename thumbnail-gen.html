<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; background: #fff; }

  .wrap {
    width: 1200px; height: 630px;
    display: flex;
  }

  /* 좌측 네이비 패널 */
  .left {
    width: 480px; height: 100%;
    background: #1a3fa8;
    padding: 60px 56px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .left::after {
    content: '';
    position: absolute;
    right: -60px; bottom: -60px;
    width: 240px; height: 240px; border-radius: 50%;
    border: 40px solid rgba(255,255,255,0.05);
  }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    width: fit-content;
    background: rgba(255,255,255,0.12);
    padding: 6px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,0.85); letter-spacing: 1.5px;
  }

  .left-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 38px; font-weight: 700;
    color: #fff; line-height: 1.3;
    letter-spacing: -0.5px;
  }
  .left-title .dim { color: rgba(255,255,255,0.55); font-weight: 400; font-size: 22px; display: block; margin-bottom: 10px; }

  .left-org {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px; color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px;
  }

  /* 우측 흰 패널 */
  .right {
    flex: 1; height: 100%;
    background: #fff;
    padding: 60px 56px;
    display: flex; flex-direction: column; justify-content: space-between;
    border-left: 1px solid #eef0f4;
  }

  .right-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px; font-weight: 700;
    color: #1a3fa8; letter-spacing: 2px;
    text-transform: uppercase;
    padding-bottom: 16px;
    border-bottom: 2px solid #1a3fa8;
    width: fit-content;
  }

  .agenda-list {
    flex: 1;
    display: flex; flex-direction: column; justify-content: center;
    gap: 0;
  }
  .agenda-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid #f0f2f5;
  }
  .agenda-item:last-child { border-bottom: none; }
  .agenda-num {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px; font-weight: 700;
    color: #1a3fa8; min-width: 20px;
    padding-top: 1px;
  }
  .agenda-text {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 500; color: #1a1f2e;
    line-height: 1.4;
  }
  .agenda-sub {
    font-size: 11px; color: #9aa0ad; font-weight: 400;
    margin-top: 2px;
  }

  .right-footer {
    display: flex; justify-content: space-between; align-items: center;
  }
  .date-text {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px; color: #c0c5ce;
  }
  .url-text {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px; color: #d4d8df; letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="badge">Executive Briefing</div>
    <div>
      <div class="left-title">
        <span class="dim">도·소매업 안전보건 협의체</span>
        임원<br/>브리핑
      </div>
    </div>
    <div class="left-org">㈜아성다이소 안전보건팀 · 2026</div>
  </div>

  <div class="right">
    <div class="right-label">Agenda</div>

    <div class="agenda-list">
      <div class="agenda-item">
        <div class="agenda-num">01</div>
        <div><div class="agenda-text">도·소매업 안전보건 현황</div><div class="agenda-sub">산업재해 통계 · 업종 특성</div></div>
      </div>
      <div class="agenda-item">
        <div class="agenda-num">02</div>
        <div><div class="agenda-text">협의체 법적 의무 및 구성</div><div class="agenda-sub">산업안전보건법 적용 요건</div></div>
      </div>
      <div class="agenda-item">
        <div class="agenda-num">03</div>
        <div><div class="agenda-text">운영 방향 및 실행 과제</div><div class="agenda-sub">반기 회의 · 위원 구성 · 안건</div></div>
      </div>
      <div class="agenda-item">
        <div class="agenda-num">04</div>
        <div><div class="agenda-text">임원 의사결정 사항</div><div class="agenda-sub">투자 우선순위 · 추진 일정</div></div>
      </div>
    </div>

    <div class="right-footer">
      <div class="date-text">2026.04 · 내부 배포용</div>
      <div class="url-text">gerrardbak08.github.io/dosomae-safety-briefing</div>
    </div>
  </div>
</div>
</body>
</html>
