<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: #f4f6fb;
  }

  .wrap { width: 1200px; height: 630px; display: flex; position: relative; }

  /* 상단 파란 바 */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 5px; background: #1a3fa8;
  }

  /* 좌측 메인 영역 */
  .left {
    width: 580px; height: 100%;
    padding: 60px 64px;
    display: flex; flex-direction: column; justify-content: space-between;
    background: #fff;
    border-right: 1px solid #e4e8f0;
  }

  .category {
    display: inline-flex; align-items: center; gap: 8px;
    background: #eef2fc;
    padding: 6px 14px;
    width: fit-content;
  }
  .cat-dot { width: 7px; height: 7px; border-radius: 50%; background: #1a3fa8; }
  .cat-text { font-size: 11px; font-weight: 700; color: #1a3fa8; letter-spacing: 1.5px; }

  .title-block {}
  .title-sub { font-size: 15px; color: #6b7789; font-weight: 400; margin-bottom: 12px; }
  .title-main { font-size: 46px; font-weight: 800; color: #0d1f3c; line-height: 1.2; letter-spacing: -1.5px; }
  .title-main .blue { color: #1a3fa8; }

  .org-row { display: flex; align-items: center; gap: 10px; }
  .org-line { width: 24px; height: 2px; background: #1a3fa8; }
  .org-text { font-size: 12px; color: #9aa5b8; font-weight: 400; }

  /* 우측 정보 영역 */
  .right {
    flex: 1; height: 100%;
    padding: 56px 52px;
    background: #f4f6fb;
    display: flex; flex-direction: column; justify-content: space-between;
  }

  .right-title { font-size: 11px; font-weight: 700; color: #9aa5b8; letter-spacing: 2px; margin-bottom: 24px; }

  .info-list { display: flex; flex-direction: column; gap: 14px; }
  .info-item {
    background: #fff;
    border-radius: 8px;
    padding: 16px 18px;
    border: 1px solid #e4e8f0;
  }
  .info-label { font-size: 10px; font-weight: 700; color: #b0b8c8; letter-spacing: 1px; margin-bottom: 5px; }
  .info-value { font-size: 14px; font-weight: 700; color: #1a1f2e; }
  .info-item.accent { border-color: #c5d3f5; background: #eef2fc; }
  .info-item.accent .info-value { color: #1a3fa8; }

  .url-box { font-size: 10px; color: #c8cdd8; letter-spacing: 0.5px; text-align: right; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar"></div>

  <div class="left">
    <div class="category">
      <div class="cat-dot"></div>
      <div class="cat-text">Safety Briefing · 2026</div>
    </div>

    <div class="title-block">
      <div class="title-sub">도·소매업 안전보건 협의체</div>
      <div class="title-main">운영 현황<br><span class="blue">분석 자료</span></div>
    </div>

    <div class="org-row">
      <div class="org-line"></div>
      <div class="org-text">㈜아성다이소 안전보건팀</div>
    </div>
  </div>

  <div class="right">
    <div>
      <div class="right-title">CONTENTS</div>
      <div class="info-list">
        <div class="info-item accent">
          <div class="info-label">적용 대상</div>
          <div class="info-value">도·소매업 안전보건법 적용 협의체</div>
        </div>
        <div class="info-item">
          <div class="info-label">주요 내용</div>
          <div class="info-value">현황 분석 · 법적 의무 · 운영 방향</div>
        </div>
        <div class="info-item">
          <div class="info-label">배포 목적</div>
          <div class="info-value">의사결정 지원 · 내부 자료</div>
        </div>
      </div>
    </div>

    <div class="url-box">gerrardbak08.github.io/dosomae-safety</div>
  </div>
</div>
</body>
</html>
