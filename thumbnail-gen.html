<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: "Pretendard Variable", "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #fff;
  }

  .wrap { width: 1200px; height: 630px; display: flex; }

  /* 좌측 네이비 패널 */
  .left {
    width: 460px; height: 100%;
    background: #1a3fa8;
    padding: 58px 52px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .left::before {
    content: '';
    position: absolute; right: -50px; top: -50px;
    width: 200px; height: 200px; border-radius: 50%;
    border: 32px solid rgba(255,255,255,0.06);
  }
  .left::after {
    content: '';
    position: absolute; right: -30px; bottom: -60px;
    width: 260px; height: 260px; border-radius: 50%;
    border: 32px solid rgba(255,255,255,0.04);
  }

  .badge {
    display: inline-block; width: fit-content;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 5px 14px;
    font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,0.8); letter-spacing: 2px;
    text-transform: uppercase;
  }

  .left-sub {
    font-size: 14px; color: rgba(255,255,255,0.5);
    font-weight: 400; margin-bottom: 10px;
  }
  .left-title {
    font-size: 42px; font-weight: 800;
    color: #fff; line-height: 1.2;
    letter-spacing: -1px;
  }
  .left-org {
    font-size: 12px; color: rgba(255,255,255,0.35);
    font-weight: 400; letter-spacing: 0.3px;
  }

  /* 우측 흰 패널 */
  .right {
    flex: 1; height: 100%;
    background: #fafbfc;
    padding: 52px 52px 48px;
    display: flex; flex-direction: column; justify-content: space-between;
    border-left: 1px solid #e8eaef;
  }

  .right-head {
    display: flex; align-items: center; justify-content: space-between;
  }
  .right-label {
    font-size: 11px; font-weight: 700;
    color: #1a3fa8; letter-spacing: 2px; text-transform: uppercase;
  }
  .date-badge {
    background: #1a3fa8; color: #fff;
    padding: 4px 12px;
    font-size: 11px; font-weight: 700;
  }

  .agenda-list { display: flex; flex-direction: column; gap: 0; }
  .agenda-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 13px 0;
    border-bottom: 1px solid #eef0f4;
  }
  .agenda-item:last-child { border-bottom: none; }
  .num {
    font-size: 11px; font-weight: 700; color: #1a3fa8;
    min-width: 18px; padding-top: 2px;
  }
  .agenda-body { }
  .agenda-main { font-size: 14px; font-weight: 600; color: #1a1f2e; }
  .agenda-desc { font-size: 11px; color: #9aa0ad; margin-top: 2px; }

  .right-foot {
    display: flex; justify-content: space-between; align-items: center;
  }
  .foot-left { font-size: 11px; color: #c4c8d0; }
  .foot-right { font-size: 10px; color: #d4d8df; letter-spacing: 0.3px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="badge">Executive Briefing</div>
    <div>
      <div class="left-sub">도·소매업 안전보건 협의체</div>
      <div class="left-title">임원<br>브리핑</div>
    </div>
    <div class="left-org">㈜아성다이소 안전보건팀 · 2026</div>
  </div>

  <div class="right">
    <div class="right-head">
      <div class="right-label">Agenda</div>
      <div class="date-badge">2026.04</div>
    </div>

    <div class="agenda-list">
      <div class="agenda-item">
        <div class="num">01</div>
        <div class="agenda-body">
          <div class="agenda-main">도·소매업 안전보건 현황</div>
          <div class="agenda-desc">산업재해 통계 · 업종 특성 분석</div>
        </div>
      </div>
      <div class="agenda-item">
        <div class="num">02</div>
        <div class="agenda-body">
          <div class="agenda-main">협의체 법적 의무 및 구성</div>
          <div class="agenda-desc">산업안전보건법 적용 요건 및 구성 방법</div>
        </div>
      </div>
      <div class="agenda-item">
        <div class="num">03</div>
        <div class="agenda-body">
          <div class="agenda-main">운영 방향 및 실행 과제</div>
          <div class="agenda-desc">반기 회의 · 위원 구성 · 안건 계획</div>
        </div>
      </div>
      <div class="agenda-item">
        <div class="num">04</div>
        <div class="agenda-body">
          <div class="agenda-main">임원 의사결정 사항</div>
          <div class="agenda-desc">투자 우선순위 · 추진 일정 승인</div>
        </div>
      </div>
    </div>

    <div class="right-foot">
      <div class="foot-left">내부 배포용 · 안전보건팀</div>
      <div class="foot-right">gerrardbak08.github.io/dosomae-safety-briefing</div>
    </div>
  </div>
</div>
</body>
</html>
